name: 🚀 ZUNNY CLOUD RDP SERVER

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '🕐 Thời gian sử dụng'
        required: false
        default: '5h40m'
        type: choice
        options:
        - '1h'
        - '3h' 
        - '5h40m'

jobs:
  Zunny-RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 340
    
    steps:
      - name: 📥 CHECKOUT SOURCE CODE
        uses: actions/checkout@v4

      - name: 🎯 KHỞI ĐỘNG HỆ THỐNG ZUNNY
        run: |
          Write-Host ""
          Write-Host ""
          Write-Host "🦊 ZUNNY CLOUD PREMIUM RDP SERVER" -ForegroundColor Yellow
          Write-Host "⚡ Powered by Zun Technologies" -ForegroundColor Green
          Write-Host "🕒 Thời gian: ${{ github.event.inputs.duration }}" -ForegroundColor Magenta
          Write-Host ""
          $frames = @('⣾', '⣽', '⣻', '⢿', '⡿', '⣟', '⣯', '⣷')
          for($i=0; $i -lt 10; $i++) {
              Write-Host "`r🚀 Đang khởi tạo hệ thống Zunny... $($frames[$i % 8])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Milliseconds 100
          }
          Write-Host "`r✅ Hệ thống Zunny đã sẵn sàng!                    " -ForegroundColor Green

      - name: 🔧 CẤU HÌNH HỆ THỐNG
        run: |
          Write-Host ""
          Write-Host "🛠️  ĐANG CẤU HÌNH HỆ THỐNG" -ForegroundColor Yellow
          $steps = @(
              @{Name="Bật Remote Desktop"; Script={ 
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
              }},
              @{Name="Tắt xác thực mạng"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
              }},
              @{Name="Cấu hình bảo mật RDP"; Script={
                  Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
              }},
              @{Name="Mở port 3389 firewall"; Script={
                  netsh advfirewall firewall add rule name="RDP-Zunny" dir=in action=allow protocol=TCP localport=3389 profile=any
                  netsh advfirewall firewall add rule name="RDP-Zunny-Out" dir=out action=allow protocol=TCP localport=3389 profile=any
              }},
              @{Name="Khởi động dịch vụ RDP"; Script={
                  Set-Service -Name TermService -StartupType Automatic -ErrorAction SilentlyContinue
                  Set-Service -Name UmRdpService -StartupType Automatic -ErrorAction SilentlyContinue
                  Start-Service -Name TermService -ErrorAction SilentlyContinue
                  Start-Service -Name UmRdpService -ErrorAction SilentlyContinue
              }}
          )
          foreach($step in $steps) {
              Write-Host "│ 📋 $($step.Name)..." -NoNewline -ForegroundColor White
              try {
                  & $step.Script
                  Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green
              } catch {
                  Write-Host "`r│ ⚠️  $($step.Name) - Đã bỏ qua lỗi nhỏ" -ForegroundColor Yellow
              }
              Start-Sleep -Milliseconds 500
          }
          Write-Host "🎯 Cấu hình hoàn tất!" -ForegroundColor Green

      - name: 👤 TẠO USER ZUNNY & CẤP QUYỀN
        run: |
          Write-Host ""
          Write-Host "👤 ĐANG TẠO TÀI KHOẢN ZUNNY" -ForegroundColor Yellow
          $randomPart = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 6 | ForEach-Object { [char]$_ })
          $matKhau = "Zunny$randomPart"
          $securePass = ConvertTo-SecureString $matKhau -AsPlainText -Force
          $userName = "ZunnyUser"
          try {
              Remove-LocalUser -Name $userName -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Đã xóa user cũ (nếu có)" -ForegroundColor Green
          } catch { }
          try {
              New-LocalUser -Name $userName -Password $securePass -AccountNeverExpires -Description "Zunny Cloud User" -ErrorAction Stop
              Write-Host "│ ✅ Đã tạo user $userName" -ForegroundColor Green
              Set-LocalUser -Name $userName -PasswordNeverExpires $true -ErrorAction SilentlyContinue
              Add-LocalGroupMember -Group "Administrators" -Member $userName -ErrorAction Stop
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member $userName -ErrorAction Stop
              Write-Host "│ ✅ Đã cấp quyền Administrator & RDP" -ForegroundColor Green
              Enable-LocalUser -Name $userName
              Write-Host "│ ✅ Đã kích hoạt user" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Lỗi tạo user: $($_.Exception.Message)" -ForegroundColor Red
              exit 1
          }
          echo "RDP_USER=$userName" >> $env:GITHUB_ENV
          echo "RDP_PASS=$matKhau" >> $env:GITHUB_ENV
          echo "$matKhau" > $env:TEMP\rdp_password.txt
          Write-Host "✅ Tài khoản $userName đã sẵn sàng" -ForegroundColor Green

      - name: 🖼️ CÀI ĐẶT WALLPAPER ZUNNY (SCHEDULED TASK)
        run: |
          Write-Host ""
          Write-Host "🖼️ ĐANG CÀI ĐẶT HÌNH NỀN ZUNNY QUA SCHEDULED TASK" -ForegroundColor Yellow
          $sourceImage = "image/image.png"
          $destImage = "C:\Windows\Web\Wallpaper\Zunny\zunny_wallpaper.png"
          $userName = $env:RDP_USER
          New-Item -ItemType Directory -Path "C:\Windows\Web\Wallpaper\Zunny" -Force -ErrorAction SilentlyContinue
          if (Test-Path $sourceImage) {
              Copy-Item -Path $sourceImage -Destination $destImage -Force
              Write-Host "│ ✅ Đã copy ảnh nền vào $destImage" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ Không tìm thấy file $sourceImage" -ForegroundColor Red
              exit 1
          }
          $scriptPath = "C:\Windows\Setup\Scripts\SetZunnyWallpaper.ps1"
          New-Item -ItemType Directory -Path "C:\Windows\Setup\Scripts" -Force -ErrorAction SilentlyContinue
          Set-Content -Path $scriptPath -Value 'Start-Sleep -Seconds 3' -Encoding UTF8 -Force
          Add-Content -Path $scriptPath -Value '$wp = "C:\Windows\Web\Wallpaper\Zunny\zunny_wallpaper.png"'
          Add-Content -Path $scriptPath -Value 'Remove-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "Wallpaper" -ErrorAction SilentlyContinue'
          Add-Content -Path $scriptPath -Value 'Remove-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\CurrentVersion\Policies\System" -Name "NoChangingWallPaper" -ErrorAction SilentlyContinue'
          Add-Content -Path $scriptPath -Value 'Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "Wallpaper"      -Value $wp  -Force'
          Add-Content -Path $scriptPath -Value 'Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "WallpaperStyle" -Value "2" -Force'
          Add-Content -Path $scriptPath -Value 'Set-ItemProperty -Path "HKCU:\Control Panel\Desktop" -Name "TileWallpaper"  -Value "0" -Force'
          Add-Content -Path $scriptPath -Value 'Add-Type -TypeDefinition ''using System; using System.Runtime.InteropServices; public class Win32WP { [DllImport("user32.dll", CharSet=CharSet.Auto)] public static extern int SystemParametersInfo(int uAction, int uParam, string lpvParam, int fuWinIni); }'' -ErrorAction SilentlyContinue'
          Add-Content -Path $scriptPath -Value '[Win32WP]::SystemParametersInfo(0x14, 0, $wp, 3)'
          Write-Host "│ ✅ Đã tạo script wallpaper tại $scriptPath" -ForegroundColor Green
          $action    = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -WindowStyle Hidden -NonInteractive -File `"$scriptPath`""
          $trigger   = New-ScheduledTaskTrigger -AtLogOn -User $userName
          $principal = New-ScheduledTaskPrincipal -UserId $userName -LogonType Interactive -RunLevel Highest
          $settings  = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -ExecutionTimeLimit (New-TimeSpan -Minutes 2)
          Register-ScheduledTask -TaskName "ZunnyWallpaper" -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
          Write-Host "│ ✅ Đã tạo Scheduled Task (chạy mỗi lần $userName login)" -ForegroundColor Green
          try {
              reg load "HKU\ZunnyDefault" "C:\Users\Default\NTUSER.DAT" 2>&1 | Out-Null
              New-Item -Path "Registry::HKU\ZunnyDefault\Control Panel\Desktop" -Force -ErrorAction SilentlyContinue | Out-Null
              Set-ItemProperty -Path "Registry::HKU\ZunnyDefault\Control Panel\Desktop" -Name "Wallpaper"      -Value $destImage -Force -ErrorAction SilentlyContinue
              Set-ItemProperty -Path "Registry::HKU\ZunnyDefault\Control Panel\Desktop" -Name "WallpaperStyle" -Value "2"        -Force -ErrorAction SilentlyContinue
              Set-ItemProperty -Path "Registry::HKU\ZunnyDefault\Control Panel\Desktop" -Name "TileWallpaper"  -Value "0"        -Force -ErrorAction SilentlyContinue
              [gc]::Collect(); Start-Sleep -Seconds 1
              reg unload "HKU\ZunnyDefault" 2>&1 | Out-Null
              Write-Host "│ ✅ Đã set wallpaper vào Default User hive" -ForegroundColor Green
          } catch {
              Write-Host "│ ⚠️  Default User hive - bỏ qua" -ForegroundColor Yellow
          }
          Write-Host "│ 🔔 Wallpaper sẽ tự đổi mỗi lần $userName đăng nhập" -ForegroundColor Cyan
          Write-Host "🎯 Cấu hình wallpaper hoàn tất!" -ForegroundColor Green

      - name: 🔍 KIỂM TRA QUYỀN HỆ THỐNG
        run: |
          Write-Host ""
          Write-Host "🔍 KIỂM TRA QUYỀN ĐĂNG NHẬP" -ForegroundColor Yellow
          $user = $env:RDP_USER
          $userObj = Get-LocalUser -Name $user -ErrorAction SilentlyContinue
          if ($userObj) {
              Write-Host "│ ✅ User $user tồn tại" -ForegroundColor Green
              Write-Host "│ 📊 Trạng thái: $($userObj.Enabled)" -ForegroundColor White
          } else {
              Write-Host "│ ❌ User không tồn tại" -ForegroundColor Red
              exit 1
          }
          $isAdmin = (Get-LocalGroupMember -Group "Administrators" | Where-Object {$_.Name -like "*$user"}).Count -gt 0
          if ($isAdmin) {
              Write-Host "│ ✅ Có quyền Administrator" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ Không có quyền Administrator" -ForegroundColor Red
          }
          $isRDPUser = (Get-LocalGroupMember -Group "Remote Desktop Users" | Where-Object {$_.Name -like "*$user"}).Count -gt 0
          if ($isRDPUser) {
              Write-Host "│ ✅ Có quyền Remote Desktop" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ Không có quyền Remote Desktop" -ForegroundColor Red
          }
          $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
          if ($termService.Status -eq 'Running') {
              Write-Host "│ ✅ Dịch vụ TermService đang chạy" -ForegroundColor Green
          } else {
              Write-Host "│ ❌ Dịch vụ TermService không chạy" -ForegroundColor Red
          }
          Write-Host "🎯 Kiểm tra hoàn tất!" -ForegroundColor Green

      - name: 🌐 THIẾT LẬP MẠNG ZUNNY
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host ""
          Write-Host "🌐 ĐANG THIẾT LẬP KẾT NỐI MẠNG ZUNNY" -ForegroundColor Yellow
          try {
              $msiPath = "$env:TEMP\tailscale-zunny.msi"
              Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile $msiPath
              Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/quiet", "/norestart" -Wait
              Remove-Item $msiPath -Force -ErrorAction SilentlyContinue
              Write-Host "│ ✅ Cài đặt Tailscale thành công" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Lỗi cài đặt Tailscale" -ForegroundColor Red
          }
          Start-Sleep -Seconds 10
          try {
              & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=zunny-cloud-$env:GITHUB_RUN_ID --accept-routes --accept-dns --reset
              Write-Host "│ ✅ Kết nối Tailscale thành công" -ForegroundColor Green
          } catch {
              Write-Host "│ ❌ Lỗi kết nối Tailscale" -ForegroundColor Red
          }
          Write-Host "🔄 Đang lấy địa chỉ IP..." -NoNewline -ForegroundColor Blue
          $ip = $null
          for($i=0; $i -lt 20; $i++) {
              try {
                  $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>&1
                  if ($ip -and $ip -match '^\d+\.\d+\.\d+\.\d+$') {
                      echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
                      Write-Host "`r✅ Địa chỉ IP: $ip" -ForegroundColor Green
                      break
                  }
              } catch {}
              Write-Host "`r🔄 Đang lấy địa chỉ IP... $(@('.', '..', '...')[$i % 3])" -NoNewline -ForegroundColor Blue
              Start-Sleep -Seconds 3
          }
          if (-not $ip -or $ip -notmatch '^\d+\.\d+\.\d+\.\d+$') {
              Write-Host "`r⚠️  Không thể lấy IP, sử dụng localhost" -ForegroundColor Yellow
              echo "TAILSCALE_IP=localhost" >> $env:GITHUB_ENV
          }

      - name: 🎉 THÔNG TIN KẾT NỐI
        run: |
          $matKhau = Get-Content $env:TEMP\rdp_password.txt -ErrorAction SilentlyContinue
          if (-not $matKhau) { $matKhau = "Không thể đọc mật khẩu" }
          $userName = $env:RDP_USER
          $durationInput = "${{ github.event.inputs.duration }}"
          switch ($durationInput) {
              "1h" { $totalMinutes = 60; $displayTime = "1 giờ" }
              "3h" { $totalMinutes = 180; $displayTime = "3 giờ" }
              "5h40m" { $totalMinutes = 340; $displayTime = "5 giờ 40 phút" }
          }
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianBatDau = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $thoiGianKetThuc = $thoiGianBatDau.AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "┌───────────────────────────────────────────┐" -ForegroundColor Cyan
          Write-Host "│              🎉 KẾT NỐI THÀNH CÔNG!              │" -ForegroundColor Cyan
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 🌐  Địa chỉ: $env:TAILSCALE_IP" -ForegroundColor White
          Write-Host "│ 👤  Tài khoản: $userName" -ForegroundColor White
          Write-Host "│ 🔐  Mật khẩu: $matKhau" -ForegroundColor White
          Write-Host "│ ⏰  Thời lượng: $displayTime" -ForegroundColor White
          Write-Host "│ 🕐  Bắt đầu: $($thoiGianBatDau.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 🕐  Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))" -ForegroundColor White
          Write-Host "│ 📍  Port: 3389" -ForegroundColor White
          Write-Host "├───────────────────────────────────────────┤" -ForegroundColor Cyan
          Write-Host "│ 💡  Hướng dẫn:                                    │" -ForegroundColor Cyan
          Write-Host "│   1. Mở Remote Desktop Connection                 │" -ForegroundColor Yellow
          Write-Host "│   2. Nhập: $env:TAILSCALE_IP                      │" -ForegroundColor Yellow
          Write-Host "│   3. User: $userName | Password: trên             │" -ForegroundColor Yellow
          Write-Host "│   4. Enjoy Zunny Cloud! 🦊☁️                      │" -ForegroundColor Yellow
          Write-Host "└───────────────────────────────────────────┘" -ForegroundColor Cyan
          echo "TOTAL_MINUTES=$totalMinutes" >> $env:GITHUB_ENV

      - name: ⏳ DUY TRÌ PHIÊN LÀM VIỆC
        run: |
          $totalMinutes = $env:TOTAL_MINUTES
          $timeZone = [System.TimeZoneInfo]::FindSystemTimeZoneById("SE Asia Standard Time")
          $thoiGianBatDau = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
          $thoiGianKetThuc = $thoiGianBatDau.AddMinutes($totalMinutes)
          Write-Host ""
          Write-Host "🔄 BẮT ĐẦU DUY TRÌ PHIÊN LÀM VIỆC..." -ForegroundColor Yellow
          Write-Host "💎 Phiên: ZUNNY CLOUD" -ForegroundColor Magenta
          Write-Host "🔗 Kết nối: $env:TAILSCALE_IP" -ForegroundColor Cyan
          Write-Host "🕐 Bắt đầu: $($thoiGianBatDau.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host "🕐 Kết thúc: $($thoiGianKetThuc.ToString('HH:mm:ss'))" -ForegroundColor Green
          Write-Host ""
          $monitorScript = {
              $lastLogTime = Get-Date
              while ($true) {
                  $currentTime = Get-Date
                  if (($currentTime - $lastLogTime).TotalMinutes -ge 2) {
                      $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                      $rdpConnections = Get-NetTCPConnection -LocalPort 3389 -ErrorAction SilentlyContinue | Where-Object {$_.State -eq 'Established'}
                      Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 📊 Trạng thái - RDP: $($termService.Status), Kết nối: $($rdpConnections.Count)" -ForegroundColor Blue
                      $lastLogTime = $currentTime
                  }
                  $termService = Get-Service -Name TermService -ErrorAction SilentlyContinue
                  if ($termService.Status -ne 'Running') {
                      Write-Host "[$($currentTime.ToString('HH:mm:ss'))] 🔄 Khởi động lại TermService..." -ForegroundColor Yellow
                      Start-Service -Name TermService -ErrorAction SilentlyContinue
                  }
                  Start-Sleep -Seconds 30
              }
          }
          Start-Job -ScriptBlock $monitorScript -Name "SystemMonitor"
          $frames = @('⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏')
          $colors = @('Red', 'Yellow', 'Green', 'Cyan', 'Blue', 'Magenta')
          $startTime = Get-Date
          do {
              $thoiGianHienTai = [System.TimeZoneInfo]::ConvertTimeFromUtc((Get-Date).ToUniversalTime(), $timeZone)
              $thoiGianConLai = $thoiGianKetThuc - $thoiGianHienTai
              $gioConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalHours))
              $phutConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalMinutes % 60))
              $giayConLai = [math]::Max(0, [math]::Floor($thoiGianConLai.TotalSeconds % 60))
              $frame = $frames[([int]((Get-Date) - $startTime).TotalSeconds) % $frames.Length]
              $color = $colors[([int]((Get-Date) - $startTime).TotalMinutes) % $colors.Length]
              Write-Host "`r$frame [$($thoiGianHienTai.ToString('HH:mm:ss'))] Thời gian còn lại: $gioConLai giờ $phutConLai phút $giayConLai giây" -NoNewline -ForegroundColor $color
              Start-Sleep -Seconds 5
          } while ($thoiGianConLai.TotalSeconds -gt 0)
          Write-Host ""
          Write-Host "🎯 ĐÃ HẾT THỜI GIAN - TỰ ĐỘNG DỪNG!" -ForegroundColor Red
          Get-Job -Name "SystemMonitor" -ErrorAction SilentlyContinue | Stop-Job -PassThru | Remove-Job -Force

      - name: 🧹 DỌN DẸP HỆ THỐNG
        if: always()
        run: |
          Write-Host ""
          Write-Host "🧹 ĐANG DỌN DẸP HỆ THỐNG..." -ForegroundColor Yellow
          $cleanupSteps = @(
              @{Name="Xóa file password"; Script={ Remove-Item "$env:TEMP\rdp_password.txt" -ErrorAction SilentlyContinue }},
              @{Name="Xóa user ZunnyUser"; Script={ Remove-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue }},
              @{Name="Đóng kết nối mạng"; Script={ & "$env:ProgramFiles\Tailscale\tailscale.exe" down --accept-risk=all -ErrorAction SilentlyContinue; Start-Sleep -Seconds 5 }},
              @{Name="Xóa rule firewall"; Script={ netsh advfirewall firewall delete rule name="RDP-Zunny" dir=in -ErrorAction SilentlyContinue; netsh advfirewall firewall delete rule name="RDP-Zunny-Out" dir=out -ErrorAction SilentlyContinue }},
              @{Name="Khôi phục cài đặt RDP"; Script={ Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 1 -Force -ErrorAction SilentlyContinue; Stop-Service -Name TermService -Force -ErrorAction SilentlyContinue }}
          )
          foreach($step in $cleanupSteps) {
              Write-Host "│ 🗑️  $($step.Name)..." -NoNewline -ForegroundColor Gray
              try { & $step.Script; Write-Host "`r│ ✅ $($step.Name)" -ForegroundColor Green }
              catch { Write-Host "`r│ ⚠️  $($step.Name) - Đã xử lý an toàn" -ForegroundColor Yellow }
              Start-Sleep -Milliseconds 300
          }
          Get-Job | Stop-Job -PassThru | Remove-Job -Force -ErrorAction SilentlyContinue
          Write-Host ""
          Write-Host "🎉 Dọn dẹp hoàn tất! Hẹn gặp lại Zunny! 👋" -ForegroundColor Green
